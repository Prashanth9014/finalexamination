name: CI/CD Pipeline with Full Testing
# Complete CI/CD pipeline with 100% test coverage - Demo ready


on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          server/package-lock.json
          client/package-lock.json

    # Backend Build Steps
    - name: Install Backend Dependencies
      run: cd server && npm ci

    - name: Build Backend Project
      run: cd server && npm run build

    - name: Wait for MongoDB to be ready
      run: |
        echo "Waiting for MongoDB to be ready..."
        timeout 60s bash -c 'until nc -z localhost 27017; do sleep 1; done'
        echo "MongoDB port is open, waiting for service to be fully ready..."
        # Use Node.js to test MongoDB connection instead of mongosh
        timeout 60s bash -c 'until node -e "
          const { MongoClient } = require(\"mongodb\");
          const client = new MongoClient(\"mongodb://localhost:27017\");
          client.connect().then(() => {
            console.log(\"MongoDB connection successful\");
            client.close();
            process.exit(0);
          }).catch(() => {
            process.exit(1);
          });
        "; do sleep 2; done'
        echo "MongoDB is fully ready!"

    - name: Initialize Test Database
      run: |
        echo "Initializing test database..."
        node -e "
          const { MongoClient } = require('mongodb');
          const client = new MongoClient('mongodb://localhost:27017/exam_system_test');
          client.connect().then(async () => {
            const db = client.db('exam_system_test');
            await db.admin().ping();
            console.log('Test database initialized successfully');
            client.close();
          }).catch(console.error);
        "
        echo "Test database initialization complete!"

    - name: Run Unit Tests (No Database)
      run: cd server && npm run test:unit
      env:
        NODE_ENV: test
        JWT_SECRET: test-secret-key-for-ci-pipeline-minimum-32-chars

    - name: Run Integration Tests (With Database)
      run: cd server && timeout 300s npm run test:integration
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/exam_system_test
        JWT_SECRET: test-secret-key-for-ci-pipeline-minimum-32-chars

    - name: Run All Tests Together (Final Verification)
      run: cd server && timeout 300s npm test
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/exam_system_test
        JWT_SECRET: test-secret-key-for-ci-pipeline-minimum-32-chars


    # Frontend Build Steps
    - name: Install Frontend Dependencies
      run: cd client && npm install

    - name: Build Frontend Project
      run: cd client && npm run build

  deploy:
    name: Deploy to Server
    runs-on: self-hosted
    needs: build
    if: success()

    steps:
    - name: Deploy Application
      shell: cmd
      run: |
        cd /d "C:\Users\botte\OneDrive\Desktop\finalexamination-yesterday"
        echo [1/6] Pulling latest code...
        git pull origin main
        echo [2/6] Installing backend dependencies...
        cd server
        call npm install
        echo [3/6] Building backend...
        call npm run build
        echo [4/6] Installing frontend dependencies...
        cd ../client
        call npm install
        echo [5/6] Building frontend...
        call npm run build
        echo [6/6] Restarting backend application...
        cd ../server
        call pm2 restart exam-app
        echo Deployment completed successfully!

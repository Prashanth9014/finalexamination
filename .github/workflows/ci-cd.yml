name: CI/CD Pipeline
# Complete full-stack CI/CD implementation

on:
  push:
    branches: [main]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          server/package-lock.json
          client/package-lock.json

    # Backend CI Steps
    - name: Install Backend Dependencies
      run: cd server && npm ci

    - name: Build Backend Project
      run: cd server && npm run build

    - name: Run Backend Tests
      run: cd server && npm test -- --testPathPattern="utils"
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/test_db
        JWT_SECRET: test-secret-key-for-ci-pipeline-minimum-32-chars

    # Frontend CI Steps
    - name: Install Frontend Dependencies
      run: cd client && npm ci

    - name: Build Frontend Project
      run: cd client && npm run build

    - name: Run Frontend Tests
      run: cd client && npm run test:run
      env:
        NODE_ENV: test

  cd:
    name: Continuous Deployment
    runs-on: self-hosted
    needs: ci
    if: success()

    steps:
    - name: Deploy Full Application
      shell: cmd
      run: |
        cd /d "C:\Users\botte\OneDrive\Desktop\finalexamination-yesterday"
        echo [1/6] Pulling latest code...
        git pull origin main
        echo [2/6] Installing backend dependencies...
        cd server
        call npm install
        echo [3/6] Building backend...
        call npm run build
        echo [4/6] Installing frontend dependencies...
        cd ../client
        call npm install
        echo [5/6] Building frontend...
        call npm run build
        echo [6/6] Restarting backend application...
        cd ../server
        call pm2 restart exam-app